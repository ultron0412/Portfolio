<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">MySQL HeatWave Implementation Associate Certificate</title>
  <desc id="desc">Preview card for MySQL HeatWave Implementation Associate Rel 1 certification.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#041833" />
      <stop offset="100%" stop-color="#0b2240" />
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="36" fill="url(#bg)" />
  <rect x="38" y="38" width="1124" height="724" rx="30" fill="#08162b" stroke="#284567" stroke-width="3" />

  <rect x="72" y="88" width="1056" height="18" rx="9" fill="url(#band)" opacity="0.9" />

  <text x="96" y="188" fill="#f0f9ff" font-size="36" font-family="'Segoe UI', Arial, sans-serif" font-weight="700">ORACLE UNIVERSITY</text>
  <text x="96" y="244" fill="#9fb7d6" font-size="24" font-family="'Segoe UI', Arial, sans-serif">This certifies that</text>

  <text x="96" y="324" fill="#ecfeff" font-size="52" font-family="'Segoe UI', Arial, sans-serif" font-weight="700">Ayush Jung Kunwar</text>

  <text x="96" y="396" fill="#d1e3ff" font-size="30" font-family="'Segoe UI', Arial, sans-serif">MySQL HeatWave Implementation Associate Rel 1</text>

  <rect x="96" y="448" width="620" height="120" rx="18" fill="#102645" stroke="#345377" />
  <text x="128" y="500" fill="#67e8f9" font-size="21" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">Issued by Oracle University</text>
  <text x="128" y="540" fill="#bfdbfe" font-size="20" font-family="'Segoe UI', Arial, sans-serif">Date: Oct 2025</text>

  <circle cx="1004" cy="512" r="86" fill="#0b203c" stroke="#3b82f6" stroke-width="4" />
  <text x="1004" y="494" text-anchor="middle" fill="#22d3ee" font-size="24" font-family="'Segoe UI', Arial, sans-serif" font-weight="700">MYSQL</text>
  <text x="1004" y="528" text-anchor="middle" fill="#ecfeff" font-size="18" font-family="'Segoe UI', Arial, sans-serif">HEATWAVE</text>

  <text x="96" y="684" fill="#7f95b1" font-size="18" font-family="'Segoe UI', Arial, sans-serif">Credential Preview</text>
</svg>
