services:
  - type: web
    name: my-portfolio-api
    runtime: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://ayushjungkunwar.com.np,https://www.ayushjungkunwar.com.np
